<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="积木LCA云平台业务全景架构图">
  <title>积木LCA云平台业务全景架构</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th{font:500 14px sans-serif}
      .ts{font:400 12px sans-serif;fill:#5F5E5A}
      .lbl{font:500 12px sans-serif;fill:#444441}
      .cap{font:400 11px sans-serif;fill:#888780}
    </style>
  </defs>
  <rect width="680" height="560" fill="#ffffff"/>
  <text class="th" x="340" y="32" text-anchor="middle" style="font-size:15px;fill:#26215C">积木 LCA 云平台 · 业务全景架构</text>

  <rect x="40" y="58" width="600" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="76" text-anchor="middle" dominant-baseline="central" fill="#26215C">客户层 · 工业制造业企业 + 供应链</text>
  <text class="ts" x="340" y="95" text-anchor="middle" dominant-baseline="central">冶金 · 建材 · 有色 · 化工 · 流程制造 · 多租户隔离</text>
  <path d="M340 108 L340 128" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <text class="lbl" x="40" y="142">业务模块层 · 四大业务线</text>

  <rect x="40" y="150" width="142" height="78" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="111" y="172" text-anchor="middle" dominant-baseline="central" fill="#0C447C">产品碳 (LCA)</text>
  <text class="ts" x="111" y="190" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ISO 14040/14044</text>
  <text class="ts" x="111" y="206" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ISO 14067 · GWP/CED</text>
  <text class="ts" x="111" y="220" text-anchor="middle" dominant-baseline="central" fill="#185FA5">产品碳足迹核算</text>

  <rect x="190" y="150" width="142" height="78" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="261" y="172" text-anchor="middle" dominant-baseline="central" fill="#085041">组织碳 (GHG)</text>
  <text class="ts" x="261" y="190" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ISO 14064-1</text>
  <text class="ts" x="261" y="206" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">GHG Protocol 1/2/3</text>
  <text class="ts" x="261" y="220" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">企业温室气体清单</text>

  <rect x="340" y="150" width="142" height="78" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="411" y="172" text-anchor="middle" dominant-baseline="central" fill="#412402">CBAM 合规</text>
  <text class="ts" x="411" y="190" text-anchor="middle" dominant-baseline="central" fill="#854F0B">碳边境调节机制</text>
  <text class="ts" x="411" y="206" text-anchor="middle" dominant-baseline="central" fill="#854F0B">出口欧盟申报</text>
  <text class="ts" x="411" y="220" text-anchor="middle" dominant-baseline="central" fill="#854F0B">嵌入式排放核算</text>

  <rect x="490" y="150" width="150" height="78" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="565" y="172" text-anchor="middle" dominant-baseline="central" fill="#26215C">AI 智能模块</text>
  <text class="ts" x="565" y="190" text-anchor="middle" dominant-baseline="central" fill="#534AB7">碳管家AI助手</text>
  <text class="ts" x="565" y="206" text-anchor="middle" dominant-baseline="central" fill="#534AB7">报告生成 · 数据校验</text>
  <text class="ts" x="565" y="220" text-anchor="middle" dominant-baseline="central" fill="#534AB7">法规追踪 Agent</text>

  <path d="M340 228 L340 250" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="lbl" x="40" y="266">能力中台层 · 数据中台 + AI 中台</text>

  <rect x="40" y="274" width="290" height="104" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="185" y="294" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">数据中台</text>
  <text class="ts" x="60" y="316" dominant-baseline="central">· HiQLCD 本土 LCA 因子数据库</text>
  <text class="ts" x="60" y="334" dominant-baseline="central">· LCA 计算引擎 (ISO 方法学)</text>
  <text class="ts" x="60" y="352" dominant-baseline="central">· 碳排放因子库管理 · 版本审计</text>
  <text class="ts" x="60" y="370" dominant-baseline="central">· 多源数据 ETL (IoT/API/录入)</text>

  <rect x="350" y="274" width="290" height="104" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="495" y="294" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">AI 中台</text>
  <text class="ts" x="370" y="316" dominant-baseline="central">· RAG 检索增强 (Milvus + ES)</text>
  <text class="ts" x="370" y="334" dominant-baseline="central">· 大模型推理网关 (多模型路由)</text>
  <text class="ts" x="370" y="352" dominant-baseline="central">· Agent 编排 (法规追踪/校验)</text>
  <text class="ts" x="370" y="370" dominant-baseline="central">· Prompt 模板与评估平台</text>

  <path d="M340 378 L340 400" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="lbl" x="40" y="416">技术底座层</text>

  <rect x="40" y="424" width="600" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="442" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Spring Boot 3 · JDK 17 · Spring AI · LangChain4j · Spring Cloud</text>
  <text class="ts" x="340" y="461" text-anchor="middle" dominant-baseline="central" fill="#993C1D">K8s + Docker · MySQL · Redis · Milvus · RabbitMQ · MinIO · Prometheus</text>

  <rect x="40" y="494" width="600" height="42" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text class="cap" x="340" y="510" text-anchor="middle" dominant-baseline="central">遵循标准：ISO 14040/14044/14064-1/14067 · GHG Protocol · GB/T 30052 · CBAM 法规</text>
  <text class="cap" x="340" y="525" text-anchor="middle" dominant-baseline="central">服务冶金/建材/有色/化工等流程制造工业及其供应链 · 蚂蚁集团入股</text>
</svg>
