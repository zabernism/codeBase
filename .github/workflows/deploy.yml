name: Build and Deploy Interview Site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Build site
        working-directory: web
        run: npm run build
        env:
          VP_BASE: /${{ github.event.repository.name }}/
      - name: Commit built site to master root
        run: |
          cp -r web/docs/.vitepress/dist/* .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: auto-render from master @ ${{ github.sha }} [skip ci]" || echo "no changes"
          git push origin master
