name: Build and Deploy Interview Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Build site (split source + vitepress build)
        working-directory: web
        run: npm run build
        env:
          VP_BASE: /${{ github.event.repository.name }}/
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/docs/.vitepress/dist
          publish_branch: gh-pages
          commit_message: "deploy: auto-render from main @ ${{ github.sha }}"
