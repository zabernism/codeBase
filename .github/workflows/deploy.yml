name: Build and Deploy Interview Site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm install
      - name: Build site
        working-directory: web
        run: npm run build
        env:
          # 站点绑定了自定义域名 blog.zs666.asia，GitHub Pages 自定义域名下站点服务于
          # 域名根 '/'，故 base 必须为 '/'(不再带 /codeBase/ 仓库名前缀)。
          # 若以后在 Vercel 等根目录托管部署，config.mts 已对 VERCEL 环境同样强制 '/'，无需改动。
          # 注意：改为 '/' 后，原 zabernism.github.io/codeBase/ 子路径访问将失效(已被自定义域名取代)。
          VP_BASE: /
      - name: Commit built site to master root
        run: |
          cp -r web/docs/.vitepress/dist/* .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: auto-render from master @ ${{ github.sha }} [skip ci]" || echo "no changes"
          git push origin master
